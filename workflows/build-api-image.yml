name: Build & publish API image

# Build the Docker image on every push to main and on every release
# tag. PRs only get a build (no push) so we know the Dockerfile still
# compiles before merging.
on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    paths:
      - "studio/api/**"
      - "domain/**"
      - ".github/workflows/build-api-image.yml"

concurrency:
  group: build-api-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        # Push only on main and tags. PRs build for verification.
        if: ${{ github.event_name == 'push' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/studio-api
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,format=short

      - name: Build (+ push on main/tags)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: studio/api/Dockerfile
          push: ${{ github.event_name == 'push' }}
          build-args: |
            DOMAIN_REF=${{ github.head_ref || (startsWith(github.ref, 'refs/tags/') && 'main' || github.ref_name) }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
